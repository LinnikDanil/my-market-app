<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Витрина магазина — пользователь уже существует</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
<div class="container p-2">
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Витрина магазина</span>
                </h2>
                <a href="/orders" class="btn btn-secondary ms-auto bi bi-file-earmark-text" th:if="${authenticated}"> Заказы</a>
                <a href="/cart/items" class="btn btn-secondary bi bi-cart4" th:if="${authenticated}"> Корзина</a>
                <a href="/admin" class="btn btn-outline-dark bi bi-gear" th:if="${authenticated}"> Админ</a>
                <th:block th:replace="~{fragments/logout :: button}"></th:block>
            </div>
        </div>
    </div>
    <div class="row p-2">
        <div class="col">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="hstack gap-3">
                        <i class="bi bi-person-fill-exclamation text-warning fs-1"></i>
                        <div>
                            <h4 class="card-title mb-2">Пользователь уже существует</h4>
                            <p class="card-text mb-2">Выберите другое имя пользователя или войдите в существующий аккаунт.</p>
                            <div class="hstack gap-2">
                                <a href="/registerform" class="btn btn-outline-primary btn-sm bi bi-arrow-counterclockwise"> К регистрации</a>
                                <a href="/login" class="btn btn-outline-secondary btn-sm bi bi-box-arrow-in-right"> Войти</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>

</html>
